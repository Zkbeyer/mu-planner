name: Update Course Data

on:
  schedule:
    # Before fall semester — mid August
    - cron: '0 8 15 8 *'
    # Before spring semester — early January
    - cron: '0 8 5 1 *'
    # Before summer session — mid May
    - cron: '0 8 15 5 *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scrapers
        id: run_scrapers
        run: |
          cd scraper
          python run_all.py 2>&1 | tee /tmp/scraper_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Commit updated data files
        id: commit
        if: steps.run_scrapers.outputs.exit_code == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update course data $(date -u +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site redeploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let logs = '';
            try {
              logs = fs.readFileSync('/tmp/scraper_output.txt', 'utf8').slice(-8000);
            } catch (e) {
              logs = 'Log file not available.';
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scraper failed — manual review needed',
              body: [
                `**Workflow run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Triggered by:** ${context.eventName}`,
                '',
                '## Error logs (last 8k chars)',
                '```',
                logs,
                '```',
              ].join('\n'),
              labels: ['bug', 'automated'],
            });
